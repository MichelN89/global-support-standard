name: Publish Package (main)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: build-and-check
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
      already_on_pypi: ${{ steps.check.outputs.already_on_pypi }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Resolve package version
        id: version
        run: |
          VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("pyproject.toml").read_text())
          print(data["project"]["version"])
          PY
          )"
          echo "package_version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if version already on PyPI
        id: check
        run: |
          VERSION="${{ steps.version.outputs.package_version }}"
          if python - "$VERSION" <<'PY'
          import json
          import urllib.request
          import sys

          version = sys.argv[1]
          url = "https://pypi.org/pypi/global-support-standard/json"
          try:
            with urllib.request.urlopen(url, timeout=15) as res:
              data = json.load(res)
          except Exception:
            print("not_found")
            raise SystemExit(1)
          if version in data.get("releases", {}):
            raise SystemExit(0)
          raise SystemExit(1)
          PY
          then
            echo "already_on_pypi=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_on_pypi=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate quality gates
        run: |
          ruff check .
          pytest
          pytest --cov=src --cov-report=term-missing --cov-fail-under=80
          pip install pip-audit
          pip-audit --ignore-vuln CVE-2026-4539

      - name: Build distributions
        run: python -m build

      - name: Validate metadata
        run: twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist/*

  publish-testpypi:
    name: publish-testpypi
    needs: build
    if: needs.build.outputs.already_on_pypi == 'false'
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: publish-pypi
    needs: [build, publish-testpypi]
    if: needs.build.outputs.already_on_pypi == 'false'
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  skip:
    name: skip-publish
    needs: build
    if: needs.build.outputs.already_on_pypi == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip
        run: |
          echo "Version ${{ needs.build.outputs.package_version }} already exists on PyPI, skipping publish."
